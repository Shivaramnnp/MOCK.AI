services:
  - type: web
    name: magics-youtube-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PROXY_URL
        value: ""  # Set manually in Render dashboard for better proxy
